<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Moonhouse - Profil Pilota</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .profile-container { max-width: 900px; margin: 40px auto; background: var(--panel-bg); border: 1px solid var(--accent); padding: 30px; }
        .profile-header { display: flex; align-items: center; gap: 20px; border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 20px; }
        .profile-avatar { width: 100px; height: 100px; border: 2px solid var(--accent); background: #000; }
        .profile-info h1 { margin: 0 0 5px 0; color: var(--accent); }
        .profile-info p { margin: 0; color: var(--text-muted); }
        
        .lunar-patch {
            width: 100%; height: 400px; background: #1a1a1a url('placeholder-moon-ground.jpg') center/cover;
            border: 1px solid var(--border); display: flex; justify-content: center; align-items: center;
            color: var(--text-muted); margin-top: 20px; position: relative;
        }
    </style>
</head>
<body>
    <header class="top-nav">
        <div class="logo">MOONHOUSE<span>_OS</span></div>
        <a href="index.html" class="btn-primary" style="text-decoration:none;">Wróć do Centrali</a>
    </header>

    <main class="profile-container">
        <div class="profile-header">
            <img src="https://api.dicebear.com/7.x/bottts/svg?seed=A" class="profile-avatar" id="prof-avatar">
            <div class="profile-info">
                <h1 id="prof-nickname">Ładowanie sygnatury...</h1>
                <p>Status: <span style="color: var(--terminal-green)">Operacyjny</span></p>
                <p id="prof-ship">Klasa Statku: [Brak Danych]</p>
            </div>
        </div>

        <h3>Bio / Dziennik Pokładowy:</h3>
        <p id="prof-bio" style="font-size: 14px; line-height: 1.6;">"Zapisy czarnych skrzynek nie odnalazły wpisów dziennika."</p>

        <div class="lunar-patch">
            <p>[ SEKTOR LĄDOWANIA - Miejsce na wybraną stację i grafikę postaci ]</p>
        </div>
    </main>

    </body>
</html>
